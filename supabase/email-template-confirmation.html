<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 0 auto; padding: 40px 20px; text-align: center; }
    .logo { color: #00e676; font-size: 24px; font-weight: 700; letter-spacing: -1px; margin-bottom: 32px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; backdrop-filter: blur(12px); }
    .title { color: #ffffff; font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .text { color: #a0a0b0; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .button { display: inline-block; background: #00e676; color: #0a0a0f; padding: 14px 36px; border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
    .button:hover { box-shadow: 0 0 25px rgba(0,230,118,0.4); }
    .footer { color: #606070; font-size: 12px; margin-top: 24px; }
    .footer a { color: #808090; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">THINKERS</div>
    <div class="card">
      <div class="title">Confirma tu cuenta de estudiante</div>
      <p class="text">Estás a un paso de acceder a la formación algorítmica institucional. Confirma tu email y comienza tu transformación.</p>
      <a href="{{ .ConfirmationURL }}" class="button">Confirmar Email</a>
    </div>
    <p class="footer">Si no creaste esta cuenta, ignorá este mensaje.<br><br>THINKERS &copy; 2025</p>
  </div>
</body>
</html>
