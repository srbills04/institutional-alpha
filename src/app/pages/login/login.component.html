<main class="min-h-dvh flex items-center justify-center px-gutter">
<div class="w-full max-w-md glass-panel rounded-2xl p-8 space-y-8">
<div class="text-center space-y-2">
<div class="text-data-lg font-bold text-primary tracking-tighter uppercase">INSTITUTIONAL_ALPHA</div>
<p class="text-body-md text-on-surface-variant">Accede a tu panel de operador</p>
</div>
<form class="space-y-5">
<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Correo electrónico</label>
<input type="email" placeholder="tu@correo.com" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary transition-colors">
</div>
<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Contraseña</label>
<input type="password" placeholder="••••••••" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary transition-colors">
</div>
<div class="flex items-center justify-between">
<label class="flex items-center gap-2 cursor-pointer">
<input type="checkbox" class="accent-primary bg-surface-container-low border-outline-variant/30 rounded">
<span class="text-label-caps text-on-surface-variant uppercase">Recordarme</span>
</label>
<a class="text-label-caps text-primary hover:underline uppercase" href="#">¿Olvidaste tu contraseña?</a>
</div>
<a routerLink="/dashboard" class="block w-full text-center bg-primary text-on-primary text-label-caps px-8 py-4 rounded-full uppercase font-bold hover:shadow-[0_0_25px_rgba(0,230,118,0.4)] transition-all duration-300 no-underline">
Acceder al Panel
</a>
</form>
<div class="text-center pt-4 border-t border-outline-variant/20">
<p class="text-body-md text-on-surface-variant">¿No tienes cuenta? <a routerLink="/propuesta-educativa" class="text-primary hover:underline">Ver propuesta educativa</a></p>
</div>
</div>
</main>
