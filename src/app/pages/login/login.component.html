<main class="min-h-dvh flex items-center justify-center px-gutter">
<div class="w-full max-w-md glass-panel rounded-2xl p-8 space-y-8">
<div class="text-center space-y-2">
<div class="text-data-lg font-bold text-primary tracking-tighter uppercase">TINKER_THINKERS</div>
<p class="text-body-md text-on-surface-variant">{{ isSignUp() ? 'Crea tu cuenta de estudiante' : 'Accede a tu entorno de aprendizaje' }}</p>
</div>

<form class="space-y-5" (submit)="onSubmit($event)">
@if (error()) {
<div class="bg-error-container/20 border border-error-container/30 rounded-lg px-4 py-3 text-body-md text-error flex items-center gap-2">
<span class="material-symbols-outlined text-sm">error</span>
{{ error() }}
</div>
}
@if (success()) {
<div class="bg-primary/10 border border-primary/30 rounded-lg px-4 py-3 text-body-md text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-sm">check_circle</span>
{{ success() }}
</div>
}
@if (isSignUp()) {
<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Nombre completo</label>
<input type="text" placeholder="Tu Nombre" [value]="fullName()" (input)="fullName.set($any($event.target).value)" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary transition-colors">
</div>
}
<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Correo electrónico</label>
<input type="email" placeholder="tu@correo.com" [value]="email()" (input)="email.set($any($event.target).value)" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary transition-colors">
</div>
<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Contraseña</label>
<input type="password" placeholder="••••••••" [value]="password()" (input)="password.set($any($event.target).value)" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none focus:border-primary transition-colors">
</div>
<button type="submit" [class.opacity-50]="loading()" [attr.disabled]="loading() ? '' : null" class="w-full bg-primary text-on-primary text-label-caps px-8 py-4 rounded-full uppercase font-bold hover:shadow-[0_0_25px_rgba(0,230,118,0.4)] transition-all duration-300">
@if (loading()) {
<span class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined animate-spin text-sm">sync</span>
Conectando...
</span>
} @else {
{{ isSignUp() ? 'Crear Cuenta' : 'Acceder al Panel' }}
}
</button>
</form>

<div class="text-center pt-4 border-t border-outline-variant/20">
<p class="text-body-md text-on-surface-variant">
{{ isSignUp() ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?' }}
<button (click)="toggleMode()" class="text-primary hover:underline cursor-pointer bg-transparent border-0">
{{ isSignUp() ? 'Inicia sesión' : 'Regístrate' }}
</button>
</p>
</div>
</div>
</main>
