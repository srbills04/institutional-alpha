<main class="pt-32 pb-24 px-gutter md:px-margin-desktop max-w-container-max mx-auto">
@if (loading()) {
<div class="flex justify-center py-20"><span class="material-symbols-outlined text-primary animate-spin text-4xl">sync</span></div>
} @else {
<div class="mb-6">
<a routerLink="/dashboard" class="flex items-center gap-1 text-label-caps text-on-surface-variant hover:text-primary uppercase no-underline">
<span class="material-symbols-outlined text-sm">arrow_back</span>
Volver al Dashboard
</a>
</div>

<div class="max-w-lg mx-auto space-y-6">
<div class="glass-panel p-6 rounded-lg space-y-4">
<h1 class="text-headline-md text-on-surface">Mi Perfil</h1>

@if (message()) {
<div class="bg-primary/10 border border-primary/30 rounded-lg px-4 py-3 text-body-md text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-sm">check_circle</span>
{{ message() }}
</div>
}
@if (error()) {
<div class="bg-error-container/20 border border-error-container/30 rounded-lg px-4 py-3 text-body-md text-error flex items-center gap-2">
<span class="material-symbols-outlined text-sm">error</span>
{{ error() }}
</div>
}

<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Correo electrónico</label>
<input type="email" [value]="email()" disabled class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface-variant/50 cursor-not-allowed">
</div>

<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Nombre completo</label>
<input [(ngModel)]="fullName" type="text" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface focus:outline-none focus:border-primary transition-colors">
</div>

<div class="space-y-2">
<label class="text-label-caps uppercase text-on-surface-variant block">Rol</label>
<div class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg px-4 py-3 text-body-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-sm" [class.text-primary]="role() === 'Admin'" [class.text-on-surface-variant]="role() !== 'Admin'">{{ role() === 'Admin' ? 'shield' : 'school' }}</span>
{{ role() }}
</div>
</div>

<button (click)="save()" [class.opacity-50]="saving()" [attr.disabled]="saving() ? '' : null" class="w-full bg-primary text-on-primary text-label-caps px-8 py-4 rounded-full uppercase font-bold hover:shadow-[0_0_25px_rgba(0,230,118,0.4)] transition-all duration-300">
@if (saving()) {
<span class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined animate-spin text-sm">sync</span>
Guardando...
</span>
} @else {
Guardar Cambios
}
</button>
</div>
</div>
}
</main>
