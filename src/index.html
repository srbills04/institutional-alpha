<!doctype html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8">
  <title>Tinker Thinkers</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-container": "#5b0011",
            "on-primary-container": "#00612e",
            "primary-container": "#00e676",
            "primary": "#75ff9e",
            "on-error-container": "#ffdad6",
            "surface-tint": "#00e475",
            "secondary-container": "#ff525f",
            "secondary": "#ffb3b3",
            "error-container": "#93000a",
            "tertiary-fixed-dim": "#b0c6ff",
            "on-secondary": "#680014",
            "inverse-primary": "#006d35",
            "inverse-surface": "#e2e2e2",
            "background": "#121414",
            "tertiary-container": "#b3c8ff",
            "surface-container-lowest": "#0d0e0f",
            "secondary-fixed-dim": "#ffb3b3",
            "on-tertiary-container": "#004eb5",
            "on-secondary-fixed-variant": "#920021",
            "on-primary-fixed": "#00210b",
            "on-primary": "#003918",
            "surface-container": "#1e2020",
            "on-tertiary": "#002d6e",
            "outline-variant": "#3b4a3d",
            "surface-dim": "#121414",
            "surface-container-low": "#1a1c1c",
            "on-primary-fixed-variant": "#005226",
            "on-surface": "#e2e2e2",
            "inverse-on-surface": "#2f3131",
            "tertiary-fixed": "#d9e2ff",
            "tertiary": "#dce4ff",
            "surface-variant": "#333535",
            "surface-container-high": "#282a2b",
            "outline": "#859585",
            "on-surface-variant": "#bacbb9",
            "on-background": "#e2e2e2",
            "error": "#ffb4ab",
            "on-tertiary-fixed": "#001945",
            "on-error": "#690005",
            "primary-fixed": "#62ff96",
            "surface-bright": "#38393a",
            "secondary-fixed": "#ffdad9",
            "on-secondary-fixed": "#400009",
            "surface-container-highest": "#333535",
            "on-tertiary-fixed-variant": "#00429b",
            "primary-fixed-dim": "#00e475",
            "surface": "#121414"
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
          spacing: {
            "margin-desktop": "32px",
            "container-max": "1440px",
            "gutter": "16px",
            "unit": "4px",
            "margin-mobile": "16px"
          },
          fontFamily: {
            "label-caps": ["JetBrains Mono"],
            "data-lg": ["JetBrains Mono"],
            "display-lg": ["Inter"],
            "data-md": ["JetBrains Mono"],
            "body-md": ["Inter"],
            "body-lg": ["Inter"],
            "headline-md": ["Inter"]
          },
          fontSize: {
            "label-caps": ["11px", { lineHeight: "1", letterSpacing: "0.08em", fontWeight: "700" }],
            "data-lg": ["18px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "500" }],
            "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
            "data-md": ["13px", { lineHeight: "1.4", letterSpacing: "0", fontWeight: "400" }],
            "body-md": ["14px", { lineHeight: "1.5", letterSpacing: "0", fontWeight: "400" }],
            "body-lg": ["16px", { lineHeight: "1.5", letterSpacing: "0", fontWeight: "400" }],
            "headline-md": ["24px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }]
          }
        }
      }
    }
  </script>
  <style>
    .grid-bg {
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(133, 149, 133, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(133, 149, 133, 0.05) 1px, transparent 1px);
    }
    .tech-border { position: relative; }
    .tech-border::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 8px; height: 1px; background-color: #00e676;
    }
    .tech-border::after {
      content: ''; position: absolute; top: 0; left: 0;
      width: 1px; height: 8px; background-color: #00e676;
    }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
